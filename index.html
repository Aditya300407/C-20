<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tetris</title>
  <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
  <div id="game-wrapper">
    <div id="sidebar-left">
      <div class="info-box">
        <div class="info-label">SCORE</div>
        <div class="info-value" id="score">0</div>
      </div>
      <div class="info-box">
        <div class="info-label">LEVEL</div>
        <div class="info-value" id="level">1</div>
      </div>
      <div class="info-box">
        <div class="info-label">LINES</div>
        <div class="info-value" id="lines">0</div>
      </div>
    </div>

    <div id="canvas-container">
      <canvas id="game-canvas"></canvas>
      <div id="overlay" class="overlay">
        <div id="overlay-content">
          <h1 id="overlay-title">TETRIS</h1>
          <p id="overlay-message">Swipe or use buttons to play</p>
          <button id="overlay-btn">START GAME</button>
        </div>
      </div>
    </div>

    <div id="sidebar-right">
      <div class="info-box">
        <div class="info-label">NEXT</div>
        <canvas id="next-canvas" width="100" height="100"></canvas>
      </div>
      <button id="pause-btn">PAUSE</button>
    </div>
  </div>

  <div id="controls">
    <div class="controls-row">
      <button class="ctrl-btn" id="btn-rotate">&#8593; ROTATE</button>
    </div>
    <div class="controls-row">
      <button class="ctrl-btn" id="btn-left">&#8592;</button>
      <button class="ctrl-btn" id="btn-down">&#8595;</button>
      <button class="ctrl-btn" id="btn-right">&#8594;</button>
    </div>
    <div class="controls-row">
      <button class="ctrl-btn wide-btn" id="btn-drop">HARD DROP</button>
    </div>
  </div>

  <script src="tetris.js"></script>
</body>
</html>
